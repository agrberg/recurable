plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3

Metrics/ClassLength:
  Max: 200 # Recurrence class has nested constant modules

Metrics/AbcSize:
  Max: 32 # attributes_from and rrule are large hash mappings

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/MethodLength:
  CountAsOne: ['array', 'hash']

Metrics/PerceivedComplexity:
  Max: 10

Style/Documentation:
  Enabled: false

# This gem has no Rails environment task
Rails/RakeEnvironment:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/MultipleMemoizedHelpers:
  Max: 16

RSpec/NestedGroups:
  Max: 4

RSpec/ExampleLength:
  Max: 10

RSpec/NamedSubject:
  Enabled: false
